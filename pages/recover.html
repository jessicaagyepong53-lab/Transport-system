</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-left">
      <div>
        <h1><i class="fa-solid fa-trash-can-arrow-up" style="margin-right:10px;color:var(--accent)"></i>Recovery</h1>
        <p>Deleted items are kept for 30 days before permanent removal</p>
      </div>
    </div>
    <a href="/index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
  </div>

  <div class="top-bar">
    <span class="count" id="trashCount"></span>
    <button class="btn btn-danger-fill" id="purgeBtn" data-admin-only onclick="purgeAll()" style="display:none">
      <i class="fa-solid fa-trash"></i> Empty Trash
    </button>
  </div>

  <div id="trashList"></div>

  <div class="footer-note">
    <a href="/index.html" style="color:var(--muted);text-decoration:none;font-size:0.75rem;display:inline-flex;align-items:center;gap:5px;margin-bottom:8px;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
      <i class="fa-solid fa-chart-pie"></i> Dashboard
    </a>
    <br><i class="fa-regular fa-copyright"></i> 2026 All Rights Reserved
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="../src/auth.js"></script>
<script src="../src/recover.js"></script>
</body>
</html>
