</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <i class="fa-solid fa-truck-fast"></i>
    <h1>Transport Dashboard</h1>
    <p>Truck Transport Business Performance</p>
  </div>

  <div class="tabs">
    <button class="tab-btn" onclick="switchTab('login')">Login</button>
    <button class="tab-btn active" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <form id="authForm" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <label for="emailInput">Email Address</label>
      <input type="email" id="emailInput" placeholder="you@example.com" required autocomplete="email">
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Sign Up</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
let mode = 'signup';

// Auto-redirect if already logged in
(async function checkAuth() {
  const stored = localStorage.getItem('transport_auth');
  if (!stored) return;
  try {
    const auth = JSON.parse(stored);
    const resp = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + auth.token } });
    if (resp.ok) {
      window.location.href = '/index.html';
    } else {
      localStorage.removeItem('transport_auth');
    }
  } catch { localStorage.removeItem('transport_auth'); }
})();

function switchTab(tab) {
  mode = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
  });
  document.getElementById('submitBtn').textContent = tab === 'login' ? 'Login' : 'Sign Up';
  document.getElementById('errorMsg').textContent = '';
}

async function handleSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('emailInput').value.trim();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  err.textContent = '';
  if (!email) { err.textContent = 'Please enter your email'; return; }

  btn.disabled = true;
  btn.textContent = 'Please wait...';

  try {
    const endpoint = mode === 'login' ? '/api/login' : '/api/signup';
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await resp.json();

    if (!resp.ok) {
      err.textContent = data.error || 'Something went wrong';
      btn.disabled = false;
      btn.textContent = mode === 'login' ? 'Login' : 'Sign Up';
      return;
    }

    localStorage.setItem('transport_auth', JSON.stringify({
      token: data.token,
      email: data.email,
      role: data.role
    }));

    window.location.href = '/index.html';
  } catch (ex) {
    err.textContent = 'Network error — is the server running?';
    btn.disabled = false;
    btn.textContent = mode === 'login' ? 'Login' : 'Sign Up';
  }
}
</script>
</body>
